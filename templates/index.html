<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network Map – Live Connection Monitor</title>
<style>
  /* ── Reset & Base ──────────────────────────────────────────── */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:        #020810;
    --panel:     rgba(2, 12, 28, 0.92);
    --cyan:      #00d4ff;
    --cyan-dim:  rgba(0,212,255,0.15);
    --red:       #ff3a3a;
    --green:     #00ff88;
    --gold:      #ffcc00;
    --text:      #c0e8ff;
    --border:    rgba(0,212,255,0.18);
    --glow:      0 0 18px rgba(0,212,255,0.35);
    --font:      'Courier New', 'Consolas', monospace;
    --header-height: 56px;
    --stats-height: 76px;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    overflow: hidden;
    user-select: none;
  }

  /* ── Scanline overlay ──────────────────────────────────────── */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.06) 2px,
      rgba(0,0,0,0.06) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ── Header ────────────────────────────────────────────────── */
  #header {
    position: fixed; top: 0; left: 0; right: 0;
    height: 56px;
    background: rgba(2,8,20,0.95);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 20px; gap: 20px;
    z-index: 200;
    backdrop-filter: blur(8px);
  }

  .logo {
    font-size: 18px; font-weight: bold; letter-spacing: 3px;
    color: var(--cyan);
    text-shadow: var(--glow);
    white-space: nowrap;
  }
  .logo em { color: var(--red); font-style: normal; }

  .mobile-side-toggle {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    background: rgba(255,58,58,0.08);
    border: 1px solid rgba(255,58,58,0.22);
    border-radius: 4px;
    color: #ffd7d7;
    font-family: var(--font);
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
  }
  .mobile-side-toggle:focus-visible {
    outline: none;
    box-shadow: 0 0 0 2px rgba(255,58,58,0.18);
  }

  .sep {
    width: 1px; height: 30px;
    background: var(--border);
    flex-shrink: 0;
  }

  .adapter-wrap { display: flex; align-items: center; gap: 10px; }
  .adapter-wrap label { font-size: 11px; color: var(--cyan); opacity: .7; letter-spacing: 1px; }

  #adapter-select {
    background: rgba(0,212,255,0.07);
    border: 1px solid var(--border);
    color: var(--cyan);
    padding: 6px 12px;
    border-radius: 4px;
    font-family: var(--font);
    font-size: 12px;
    cursor: pointer;
    outline: none;
    transition: border .2s, box-shadow .2s;
    max-width: 320px;
  }
  #adapter-select:focus { border-color: var(--cyan); box-shadow: var(--glow); }
  #adapter-select option { background: #020c1c; }

  .filter-wrap {
    position: relative;
    flex-shrink: 0;
  }
  .filter-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 32px;
    padding: 0;
    background: rgba(0,212,255,0.07);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--cyan);
    font-family: var(--font);
    font-size: 14px;
    cursor: pointer;
    transition: border .2s, box-shadow .2s, background .2s, color .2s;
  }
  .filter-toggle:hover,
  .filter-toggle:focus-visible,
  .filter-wrap.open .filter-toggle {
    border-color: var(--cyan);
    box-shadow: var(--glow);
    outline: none;
  }
  .filter-toggle.filtered {
    color: #ff4dff;
    border-color: rgba(255,0,255,0.34);
    background: rgba(255,0,255,0.08);
  }
  .filter-menu {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    width: 190px;
    padding: 8px;
    background: rgba(2,12,28,0.96);
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow: var(--glow);
    display: none;
    z-index: 260;
  }
  .filter-wrap.open .filter-menu {
    display: block;
  }
  .filter-option {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 8px 7px;
    color: var(--text);
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
  }
  .filter-option input {
    accent-color: #ff4dff;
  }
  .conn-item.filtered-out {
    display: none;
  }

  .rotation-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 32px;
    padding: 0;
    background: rgba(0,212,255,0.07);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--cyan);
    font-family: var(--font);
    font-size: 12px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: border .2s, box-shadow .2s, background .2s, color .2s;
  }
  .rotation-toggle:hover,
  .rotation-toggle:focus-visible {
    border-color: var(--cyan);
    box-shadow: var(--glow);
    outline: none;
  }
  .rotation-toggle.paused {
    color: var(--gold);
    background: rgba(255,204,0,0.08);
    border-color: rgba(255,204,0,0.28);
    box-shadow: 0 0 14px rgba(255,204,0,0.15);
  }
  .rotation-icon {
    width: 18px;
    text-align: center;
    font-size: 13px;
  }

  .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }

  .ip-display {
    min-width: 280px;
    display: grid;
    justify-items: end;
    align-items: center;
  }

  .live-badge {
    display: flex; align-items: center; gap: 7px;
    font-size: 11px; letter-spacing: 2px; color: var(--green);
  }
  .live-dot {
    width: 8px; height: 8px;
    background: var(--green); border-radius: 50%;
    box-shadow: 0 0 8px var(--green);
    animation: blink 1.2s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

  #my-ip {
    grid-area: 1 / 1;
    font-size: 11px; color: var(--cyan); opacity: .6;
    opacity: 0;
    visibility: hidden;
    white-space: nowrap;
    transform: translateX(8px);
    transition: opacity .2s ease, transform .2s ease, visibility .2s ease;
  }
  #privacy-label {
    grid-area: 1 / 1;
    font-size: 11px;
    color: var(--cyan);
    opacity: .45;
    letter-spacing: 1px;
    white-space: nowrap;
    transition: opacity .2s ease, transform .2s ease, visibility .2s ease;
  }
  .header-right:hover #my-ip,
  .header-right:focus-within #my-ip {
    opacity: .6;
    visibility: visible;
    transform: translateX(0);
  }
  .header-right:hover #privacy-label,
  .header-right:focus-within #privacy-label {
    opacity: 0;
    visibility: hidden;
    transform: translateX(-8px);
  }

  /* ── Globe container ───────────────────────────────────────── */
  #globe-wrap {
    position: fixed;
    top: var(--header-height); left: 0;
    width: calc(100% - 370px);
    height: calc(100% - var(--header-height) - var(--stats-height));
    overflow: hidden;
  }
  #globeViz { width: 100%; height: 100%; }

  #conn-detail {
    position: absolute;
    top: 16px;
    right: 16px;
    width: min(360px, calc(100% - 32px));
    padding: 12px 14px 14px;
    background: rgba(0, 12, 26, 0.82);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: var(--glow);
    backdrop-filter: blur(8px);
    min-height: 148px;
    z-index: 120;
    display: none;
  }

  /* ── Side panel ────────────────────────────────────────────── */
  #side {
    position: fixed;
    top: var(--header-height); right: 0;
    width: 370px;
    height: calc(100% - var(--header-height) - var(--stats-height));
    background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  #side-backdrop {
    position: fixed;
    inset: var(--header-height) 0 var(--stats-height) 0;
    background: rgba(2, 8, 20, 0.68);
    backdrop-filter: blur(6px);
    opacity: 0;
    pointer-events: none;
    transition: opacity .22s ease;
    z-index: 180;
  }

  body.side-open #side-backdrop {
    opacity: 1;
    pointer-events: auto;
  }

  .panel-header {
    padding: 12px 16px;
    font-size: 11px; letter-spacing: 2px;
    color: var(--cyan); opacity: .8;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
  }

  #conn-count-badge {
    background: var(--cyan-dim);
    color: var(--cyan);
    padding: 2px 8px; border-radius: 10px;
    font-size: 11px;
  }

  #conn-list {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: thin;
    scrollbar-color: rgba(0,212,255,0.2) transparent;
  }
  #conn-list::-webkit-scrollbar { width: 4px; }
  #conn-list::-webkit-scrollbar-thumb { background: rgba(0,212,255,0.2); border-radius: 2px; }

  .conn-search-wrap {
    padding: 10px 12px;
    border-bottom: 1px solid rgba(0,212,255,0.1);
    flex-shrink: 0;
  }
  #conn-search {
    width: 100%;
    height: 32px;
    background: rgba(0,212,255,0.06);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--font);
    font-size: 11px;
    outline: none;
    padding: 0 10px;
  }
  #conn-search:focus {
    border-color: var(--cyan);
    box-shadow: var(--glow);
  }
  #conn-search::placeholder {
    color: rgba(192,232,255,0.38);
  }

  #trace-history {
    flex: 0 0 150px;
    overflow-y: auto;
    overflow-x: hidden;
    border-top: 1px solid var(--border);
    scrollbar-width: thin;
    scrollbar-color: rgba(255,0,255,0.25) transparent;
  }
  #trace-history::-webkit-scrollbar { width: 4px; }
  #trace-history::-webkit-scrollbar-thumb { background: rgba(255,0,255,0.25); border-radius: 2px; }
  .trace-history-item {
    display: block;
    width: 100%;
    padding: 9px 14px;
    background: transparent;
    border: 0;
    border-bottom: 1px solid rgba(255,0,255,0.09);
    color: #ff4dff;
    font-family: var(--font);
    font-size: 12px;
    text-align: left;
    cursor: pointer;
    transition: background .15s, color .15s;
  }
  .trace-history-item:hover,
  .trace-history-item:focus-visible {
    background: rgba(255,0,255,0.08);
    color: #fff;
    outline: none;
  }
  .trace-history-empty {
    padding: 18px 14px;
    color: #ff4dff;
    opacity: .35;
    font-size: 11px;
    line-height: 1.6;
  }

  .conn-item {
    padding: 10px 14px;
    border-bottom: 1px solid rgba(0,212,255,0.07);
    cursor: pointer;
    transition: background .15s;
    animation: slideIn .3s ease;
  }
  .conn-item:hover { background: rgba(0,212,255,0.05); }
  .conn-item.highlight { background: rgba(0,212,255,0.12); }
  .conn-item.selected {
    background: rgba(0,212,255,0.1);
    box-shadow: inset 0 0 0 1px rgba(0,212,255,0.18);
  }
  .conn-item.group-selected {
    background: rgba(255,0,255,0.11);
    box-shadow: inset 0 0 0 1px rgba(255,0,255,0.26);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(30px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .ci-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 4px;
  }
  .ci-dir {
    font-size: 10px; letter-spacing: 1.5px; font-weight: bold;
    padding: 2px 6px; border-radius: 3px;
  }
  .ci-dir.out {
    color: var(--cyan); background: rgba(0,212,255,0.12);
    border: 1px solid rgba(0,212,255,0.25);
  }
  .ci-dir.in {
    color: var(--red); background: rgba(255,58,58,0.12);
    border: 1px solid rgba(255,58,58,0.25);
  }
  .ci-port {
    font-size: 10px; color: var(--gold); opacity: .85;
    background: rgba(255,204,0,0.1); padding: 2px 6px; border-radius: 3px;
  }
  .ci-ip {
    font-size: 13px; font-weight: bold; color: #fff;
    margin-bottom: 3px;
  }
  .ci-location { font-size: 11px; color: var(--text); opacity: .7; }
  .ci-isp { font-size: 10px; color: var(--text); opacity: .45; margin-top: 2px; }
  .ci-app {
    font-size: 10px;
    color: var(--green);
    opacity: .8;
    margin-top: 6px;
  }
  .ci-bandwidth {
    font-size: 10px;
    color: var(--cyan);
    opacity: .82;
    margin-top: 4px;
  }
  .detail-empty {
    font-size: 11px;
    line-height: 1.7;
    color: var(--cyan);
    opacity: .45;
  }
  .detail-title {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--cyan);
    margin-bottom: 10px;
  }
  .detail-grid {
    display: grid;
    grid-template-columns: 92px 1fr;
    gap: 6px 10px;
    font-size: 11px;
    line-height: 1.45;
  }
  .detail-label {
    color: var(--cyan);
    opacity: .7;
  }
  .detail-value {
    color: #fff;
    word-break: break-word;
  }

  .trace-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .trace-btn {
    flex: 1;
    min-height: 30px;
    background: rgba(0,212,255,0.08);
    border: 1px solid rgba(0,212,255,0.28);
    border-radius: 4px;
    color: var(--cyan);
    font-family: var(--font);
    font-size: 10px;
    letter-spacing: 1.5px;
    cursor: pointer;
    transition: border .2s, box-shadow .2s, background .2s;
  }
  .trace-btn:hover,
  .trace-btn:focus-visible {
    border-color: var(--cyan);
    box-shadow: var(--glow);
    outline: none;
  }
  .trace-btn:disabled {
    cursor: wait;
    opacity: .5;
    box-shadow: none;
  }
  .trace-status {
    margin-top: 10px;
    color: #ff4dff;
    font-size: 10px;
    line-height: 1.5;
    min-height: 15px;
  }
  .trace-hop-list {
    margin-top: 10px;
    max-height: 170px;
    overflow: auto;
    border-top: 1px solid rgba(0,212,255,0.12);
  }
  .trace-hop {
    display: grid;
    grid-template-columns: 32px 1fr;
    gap: 8px;
    padding: 7px 0;
    border-bottom: 1px solid rgba(0,212,255,0.07);
    font-size: 10px;
    line-height: 1.45;
  }
  .trace-hop-no {
    color: #ff4dff;
  }
  .trace-hop-main {
    color: #fff;
    word-break: break-word;
  }
  .trace-hop-meta {
    color: var(--text);
    opacity: .55;
  }

  .flag-img { vertical-align: middle; margin-left: 4px; }

  /* ── Stats bar ─────────────────────────────────────────────── */
  #stats {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: var(--stats-height);
    background: rgba(2,8,20,0.95);
    border-top: 1px solid var(--border);
    display: flex; align-items: center;
    justify-content: space-around;
    padding: 0 30px;
    z-index: 200;
  }

  .stat {
    text-align: center; min-width: 90px;
  }
  .stat-val {
    font-size: 26px; font-weight: bold; line-height: 1;
    text-shadow: var(--glow);
    transition: transform .15s;
  }
  .stat-val.bump { animation: bump .3s ease; }
  @keyframes bump { 0%,100%{transform:scale(1)} 50%{transform:scale(1.25)} }
  .stat-lbl {
    font-size: 9px; letter-spacing: 2px; opacity: .55;
    margin-top: 4px; text-transform: uppercase;
  }

  .stat-divider {
    width: 1px; height: 40px;
    background: var(--border);
  }

  /* ── Tooltip ───────────────────────────────────────────────── */
  #tooltip {
    position: fixed;
    background: rgba(2,12,28,0.95);
    border: 1px solid var(--border);
    padding: 10px 14px;
    border-radius: 6px;
    font-size: 12px; line-height: 1.7;
    pointer-events: none;
    z-index: 300;
    display: none;
    max-width: 260px;
    box-shadow: var(--glow);
  }

  /* ── Spinner ───────────────────────────────────────────────── */
  #loading {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 1000;
    gap: 20px;
  }
  #loading.hidden { display: none; }
  .spinner {
    width: 50px; height: 50px;
    border: 3px solid rgba(0,212,255,0.15);
    border-top-color: var(--cyan);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { font-size: 13px; color: var(--cyan); letter-spacing: 2px; opacity: .7; }

  /* ── Empty state ───────────────────────────────────────────── */
  #empty-state {
    padding: 40px 20px; text-align: center;
    color: var(--cyan); opacity: .3; font-size: 12px; line-height: 2;
  }

  @media (max-width: 1100px) {
    #header {
      gap: 12px;
      padding: 0 12px;
    }

    .logo {
      font-size: 15px;
      letter-spacing: 2px;
    }

    .sep {
      display: none;
    }

    .adapter-wrap {
      min-width: 0;
      flex: 1;
      gap: 8px;
    }

    #adapter-select {
      min-width: 0;
      max-width: none;
      width: 100%;
    }

    .header-right {
      gap: 8px;
    }

    .ip-display {
      min-width: 0;
    }
  }

  @media (max-width: 840px) {
    .mobile-side-toggle {
      display: inline-flex;
      flex-shrink: 0;
    }

    #header {
      height: auto;
      min-height: 56px;
      align-items: flex-start;
      flex-wrap: wrap;
      padding: 10px 12px;
      gap: 10px;
    }

    .logo {
      order: 1;
      flex: 1 1 auto;
      min-width: 0;
    }

    .header-right {
      order: 2;
      margin-left: 0;
      margin-right: auto;
    }

    .adapter-wrap {
      order: 3;
      width: 100%;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 8px;
      align-items: stretch;
    }

    .adapter-wrap label {
      grid-column: 1 / -1;
      font-size: 10px;
    }

    #adapter-select {
      min-width: 0;
      width: 100%;
    }

    .rotation-toggle {
      width: 36px;
      min-width: 36px;
      justify-self: end;
    }

    .filter-menu {
      right: 0;
      left: auto;
    }

    .ip-display {
      display: none;
    }

    .live-badge {
      font-size: 10px;
      letter-spacing: 1px;
    }

    #globe-wrap {
      width: 100%;
      height: calc(100% - var(--header-height) - var(--stats-height));
    }

    #conn-detail {
      top: 10px;
      right: 10px;
      left: 10px;
      width: auto;
      min-height: 0;
      max-height: 44%;
      overflow: auto;
    }

    #side {
      width: min(88vw, 360px);
      height: calc(100% - var(--header-height));
      border-top: 1px solid var(--border);
      transform: translateX(100%);
      transition: transform .24s ease, box-shadow .24s ease;
      z-index: 220;
      box-shadow: none;
    }

    body.side-open #side {
      transform: translateX(0);
      box-shadow: -18px 0 48px rgba(0, 0, 0, 0.45);
    }

    #side-backdrop {
      inset: var(--header-height) 0 0 0;
      z-index: 210;
    }

    #stats {
      --stats-height: 92px;
      padding: 10px 12px;
      justify-content: space-between;
      gap: 8px;
      overflow-x: auto;
      overflow-y: hidden;
    }

    .stat {
      min-width: 72px;
    }

    .stat-val {
      font-size: 20px;
    }

    .stat-lbl {
      font-size: 8px;
      letter-spacing: 1px;
    }

    .stat-divider {
      height: 30px;
    }
  }

  @media (max-width: 520px) {
    .adapter-wrap {
      grid-template-columns: minmax(0, 1fr);
    }

    .rotation-toggle {
      width: 100%;
      min-width: 0;
    }

    .filter-wrap,
    .filter-toggle {
      width: 100%;
    }

    .filter-menu {
      left: 0;
      right: 0;
      width: 100%;
    }

    #side {
      width: min(92vw, 360px);
    }
  }
</style>
</head>
<body>

<!-- Loading overlay -->
<div id="loading">
  <div class="spinner"></div>
  <p>LOADING NETWORK MAP...</p>
</div>

<!-- Header -->
<div id="header">
  <div class="logo">NET<em>WATCH</em> MAP</div>
  <button id="mobile-side-toggle" class="mobile-side-toggle" type="button" aria-expanded="false" aria-controls="side" onclick="toggleSidePanel()">
    <span id="mobile-side-icon">+</span>
    <span>Connections</span>
  </button>
  <div class="sep"></div>

  <div class="stat">

<!-- ── Scripts ────────────────────────────────────────── -->
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://unpkg.com/globe.gl@2.32.2/dist/globe.gl.min.js"></script>
<script>
// ── State ───────────────────────────────────────────────────────
const connections  = {};   // id → data
let arcsData       = [];
let pointsData     = [];
let ringsData      = [];
let traceArcsData  = [];
let tracePointsData = [];
let traceTimers    = [];
let traceLoadingConnectionId = null;
let traceHistory    = [];
const destinationPositionCache = {};
let myLat = 0, myLon = 0;
let totalSeen = 0;
let globe;
let selectedConnectionId = null;
let selectedConnectionGroupIds = [];
let rotationEnabled = true;
let localDeviceIp = '';
let mobileSideOpen = false;
let connectionSearchQuery = '';

const FILTER_STORAGE_KEY = 'netwatch.visibilityFilters';
let visibilityFilters = loadVisibilityFilters();

const COLORS = {
  out:   ['rgba(0,212,255,0.9)',  'rgba(0,100,220,0.2)'],
  in:    ['rgba(255,60,60,0.9)',  'rgba(255,140,0,0.2)'],
  trace: ['rgba(255,0,255,0.98)', 'rgba(0,212,255,0.24)'],
  tracePoint: '#ff4dff',
  local: '#00ff88',
};

function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function formatBytesPerSec(value) {
  const bytes = Number(value) || 0;
  if (bytes < 1024) return `${bytes.toFixed(0)} B/s`;
  const units = ['KB/s', 'MB/s', 'GB/s'];
  let size = bytes / 1024;
  let unitIndex = 0;
  while (size >= 1024 && unitIndex < units.length - 1) {
    size /= 1024;
    unitIndex++;
  }
  return `${size >= 10 ? size.toFixed(1) : size.toFixed(2)} ${units[unitIndex]}`;
}

function formatBandwidth(conn) {
  return `RX ${formatBytesPerSec(conn.rx_bytes_per_sec)} | TX ${formatBytesPerSec(conn.tx_bytes_per_sec)}`;
}

function connectionGeometryChanged(prev, next) {
  const fields = [
    'direction',
    'src_lat',
    'src_lon',
    'dst_lat',
    'dst_lon',
    'dst_city',
    'dst_country',
    'dst_country_code',
    'display_ip',
    'remote_ip',
    'remote_port',
  ];
  return fields.some(field => String(prev?.[field] ?? '') !== String(next?.[field] ?? ''));
}

function loadVisibilityFilters() {
  const defaults = { outgoing: true, incoming: true, trace: true, device: true };
  try {
    const saved = JSON.parse(sessionStorage.getItem(FILTER_STORAGE_KEY) || '{}');
    return { ...defaults, ...saved };
  } catch (error) {
    return defaults;
  }
}

function saveVisibilityFilters() {
  sessionStorage.setItem(FILTER_STORAGE_KEY, JSON.stringify(visibilityFilters));
}

function isConnectionVisible(conn) {
  if (!conn) return false;
  if (conn.direction === 'incoming') return visibilityFilters.incoming;
  return visibilityFilters.outgoing;
}

function getConnectionSearchText(conn) {
  return [
    conn.process_name,
    conn.process_path,
    conn.display_ip,
    conn.remote_ip,
    conn.remote_hostname,
    conn.local_ip,
    conn.local_port,
    ...(conn.local_ports || []),
    conn.remote_port,
    conn.port_name,
    conn.direction,
    conn.status,
    conn.dst_city,
    conn.dst_country,
    conn.dst_country_code,
    conn.dst_isp,
    conn.pid,
  ].filter(value => value !== undefined && value !== null)
    .join(' ')
    .toLowerCase();
}

function matchesConnectionSearch(conn) {
  const query = connectionSearchQuery.trim().toLowerCase();
  if (!query) return true;
  const haystack = getConnectionSearchText(conn);
  return query.split(/\s+/).every(term => haystack.includes(term));
}

function isConnectionListVisible(conn) {
  return isConnectionVisible(conn) && matchesConnectionSearch(conn);
}

function setConnectionSearch(value) {
  connectionSearchQuery = value || '';
  updateConnectionListVisibility();
  recalcStats();
}

function getVisibleArcs() {
  const visibleArcGroups = new Map();
  arcsData.filter(arc => isConnectionVisible(arc)).forEach(arc => {
    const key = getDestinationKey(arc);
    if (!visibleArcGroups.has(key)) visibleArcGroups.set(key, []);
    visibleArcGroups.get(key).push(arc);
  });
  const visibleLiveArcs = [...visibleArcGroups.values()].flatMap(group => {
    const first = group[0];
    const destinationKey = getDestinationKey(first);
    const position = getGroupPosition(group, destinationKey);
    const directions = new Set(group.map(item => item.direction));
    const isOut = first.direction === 'outgoing';
    const color = directions.size > 1 ? COLORS.trace : (isOut ? COLORS.out : COLORS.in);
    const baseArc = {
      ...first,
      id: `group-${destinationKey}`,
      arcKind: 'base',
      connectionIds: group.map(item => item.id),
      startLat: first.src_lat,
      startLng: first.src_lon,
      endLat: position.lat,
      endLng: position.lng,
      color,
    };
    const flowArc = {
      ...baseArc,
      id: `flow-${destinationKey}`,
      arcKind: 'flow',
      color: isOut
        ? ['rgba(190,245,255,0.98)', 'rgba(0,212,255,0.08)']
        : ['rgba(255,190,220,0.98)', 'rgba(255,58,58,0.08)'],
    };
    return [baseArc, flowArc];
  });
  return visibilityFilters.trace
    ? [...visibleLiveArcs, ...traceArcsData]
    : visibleLiveArcs;
}

function getVisiblePoints() {
  const visibleLivePoints = pointsData.filter(point => {
    if (point.isLocal) return visibilityFilters.device;
    if (!point.connectionId) return true;
    if (isConnectionVisible(connections[point.connectionId])) return true;
    if (Array.isArray(point.connectionIds)) {
      return point.connectionIds.some(id => isConnectionVisible(connections[id]));
    }
    if (!point.destinationKey) return false;
    return Object.values(connections).some(conn =>
      conn && !conn._pending && getDestinationKey(conn) === point.destinationKey && isConnectionVisible(conn)
    );
  });
  const localPoints = visibleLivePoints.filter(point => point.isLocal);
  const connectionPoints = visibleLivePoints
    .filter(point => !point.isLocal)
    .map(point => ({ ...point, altitude: 0 }));
  return visibilityFilters.trace
    ? [...connectionPoints, ...localPoints, ...tracePointsData]
    : [...connectionPoints, ...localPoints];
}

function renderGlobeArcs() {
  if (!globe) return;
  globe.arcsData(getVisibleArcs());
}

function renderGlobePoints() {
  if (!globe) return;
  globe.pointsData(getVisiblePoints());
}

function updateConnectionListVisibility() {
  Object.values(connections).forEach(conn => {
    if (!conn || conn._pending) return;
    const item = document.getElementById(safeId(conn.id));
    if (item) item.classList.toggle('filtered-out', !isConnectionListVisible(conn));
  });
}

function syncFilterUI() {
  const outgoing = document.getElementById('filter-outgoing');
  const incoming = document.getElementById('filter-incoming');
  const trace = document.getElementById('filter-trace');
  const device = document.getElementById('filter-device');
  if (outgoing) outgoing.checked = visibilityFilters.outgoing;
  if (incoming) incoming.checked = visibilityFilters.incoming;
  if (trace) trace.checked = visibilityFilters.trace;
  if (device) device.checked = visibilityFilters.device;

  const toggle = document.getElementById('filter-toggle');
  if (toggle) {
    const filtered = !visibilityFilters.outgoing || !visibilityFilters.incoming || !visibilityFilters.trace || !visibilityFilters.device;
    toggle.classList.toggle('filtered', filtered);
    toggle.setAttribute('aria-label', filtered ? 'Filters active' : 'Filters');
  }
}

function applyVisibilityFilters() {
  saveVisibilityFilters();
  syncFilterUI();
  renderGlobeArcs();
  renderGlobePoints();
  updateConnectionListVisibility();
  recalcStats();
}

function setVisibilityFilter(name, enabled) {
  visibilityFilters = { ...visibilityFilters, [name]: enabled };
  applyVisibilityFilters();
}

function toggleFilterMenu(event) {
  if (event) event.stopPropagation();
  const wrap = document.getElementById('filter-wrap');
  const toggle = document.getElementById('filter-toggle');
  if (!wrap) return;
  const open = !wrap.classList.contains('open');
  wrap.classList.toggle('open', open);
  if (toggle) toggle.setAttribute('aria-expanded', String(open));
}

function closeFilterMenu() {
  const wrap = document.getElementById('filter-wrap');
  const toggle = document.getElementById('filter-toggle');
  if (wrap) wrap.classList.remove('open');
  if (toggle) toggle.setAttribute('aria-expanded', 'false');
}

function hashString(value) {
  let hash = 2166136261;
  const text = String(value ?? '');
  for (let i = 0; i < text.length; i++) {
    hash ^= text.charCodeAt(i);
    hash = Math.imul(hash, 16777619);
  }
  return hash >>> 0;
}

function getPointStyle(conn) {
  const isSelected = selectedConnectionId && conn?.id === selectedConnectionId;
  return {
    radius: isSelected ? 0.38 : 0.3,
    altitude: 0,
  };
}

function getLocalDevicePointLabel() {
  return `<div style="font-family:monospace;font-size:12px;
      background:rgba(2,12,28,.9);border:1px solid #00ff8844;
      padding:8px 12px;border-radius:6px">
      <b style="color:#00ff88">🖥️ THIS DEVICE</b><br>
      ${escapeHtml(localDeviceIp || 'Unknown')}
    </div>`;
}

function updateLocalDevicePoint() {
  let changed = false;
  pointsData = pointsData.map(point => {
    if (!point.isLocal) return point;
    changed = true;
    return { ...point, _label: getLocalDevicePointLabel() };
  });
  if (changed) renderGlobePoints();
}

function pickLocalDeviceIp(adapters, selectedName = 'all') {
  const realAdapters = (adapters || []).filter(a => a.name !== 'all');
  const selected = realAdapters.find(a => a.name === selectedName && Array.isArray(a.ips) && a.ips.length);
  if (selected) return selected.ips[0];

  const active = realAdapters.find(a => a.is_up && Array.isArray(a.ips) && a.ips.length);
  if (active) return active.ips[0];

  const any = realAdapters.find(a => Array.isArray(a.ips) && a.ips.length);
  return any ? any.ips[0] : '';
}

function getDestinationKey(conn) {
  const countryCode = String(conn.dst_country_code || '').toLowerCase();
  const countryName = String(conn.dst_country || '').toLowerCase();
  const cityName = String(conn.dst_city || '').toLowerCase();
  const countryKey = countryCode || countryName || 'unknown-country';
  const cityKey = cityName || 'unknown-city';
  return `${countryKey}|${cityKey}`;
}

function getGroupPosition(group, key = '') {
  if (key && destinationPositionCache[key]) {
    return destinationPositionCache[key];
  }

  const valid = group.filter(conn =>
    Number.isFinite(Number(conn.dst_lat)) && Number.isFinite(Number(conn.dst_lon))
  );
  if (!valid.length) {
    return { lat: group[0].dst_lat, lng: group[0].dst_lon };
  }
  const position = {
    lat: Number(valid[0].dst_lat),
    lng: Number(valid[0].dst_lon),
  };
  if (key) destinationPositionCache[key] = position;
  return position;
}

function buildConnectionPoint(conn, group = [conn]) {
  const groupIds = group.map(item => item.id);
  const destinationKey = getDestinationKey(conn);
  const position = getGroupPosition(group, destinationKey);
  const pointStyle = getPointStyle(conn);
  const isSelected = groupIds.some(id => selectedConnectionGroupIds.includes(id));
  const directions = new Set(group.map(item => item.direction));
  const pointColor = isSelected
    ? COLORS.tracePoint
    : (directions.size > 1 ? COLORS.tracePoint : (conn.direction === 'outgoing' ? '#00d4ff' : '#ff3a3a'));
  const groupCount = group.length;
  const groupedPorts = [...new Set(group.map(item => item.port_name).filter(Boolean))].slice(0, 3);
  const groupedIps = [...new Set(group.map(item => item.display_ip || item.remote_ip).filter(Boolean))];
  const groupedHostnames = [...new Set(group.map(item => item.remote_hostname).filter(Boolean))].slice(0, 3);
  const countryLabel = conn.dst_country || conn.dst_country_code || 'Unknown country';
  const cityLabel = conn.dst_city || 'Unknown city';
  return {
    lat: position.lat,
    lng: position.lng,
    color: pointColor,
    radius: groupCount > 1 ? Math.min(0.48, pointStyle.radius + groupCount * 0.035) : pointStyle.radius,
    altitude: pointStyle.altitude,
    connectionId: conn.id,
    connectionIds: groupIds,
    destinationKey,
    _label: `<div style="font-family:monospace;font-size:12px;
      background:rgba(2,12,28,.9);border:1px solid rgba(0,212,255,.3);
      padding:8px 12px;border-radius:6px">
      <b style="color:${conn.direction==='outgoing'?'#00d4ff':'#ff3a3a'}">
      ${escapeHtml(cityLabel)}, ${escapeHtml(countryLabel)}
      </b><br>
      ${groupedIps.length} server IP${groupedIps.length === 1 ? '' : 's'}<br>
      ${groupedHostnames.length ? `<span style="opacity:.7">${escapeHtml(groupedHostnames.join(', '))}</span><br>` : ''}
      <span style="color:#ffcc00">${escapeHtml(groupedPorts.join(', ') || conn.port_name)}</span><br>
      ${groupCount > 1 ? `<span style="color:#ff4dff">${groupCount} CONNECTIONS</span>` : ''}
    </div>`,
  };
}

function rebuildConnectionPoints() {
  const localPoints = pointsData.filter(point => point.isLocal);
  const destinationMap = new Map();

  Object.values(connections).forEach(conn => {
    if (!conn || conn._pending) return;
    const key = getDestinationKey(conn);
    if (!destinationMap.has(key)) destinationMap.set(key, []);
    destinationMap.get(key).push(conn);
  });

  const destinationPoints = [...destinationMap.values()].map(group => buildConnectionPoint(group[0], group));
  pointsData = [...localPoints, ...destinationPoints];
  renderGlobePoints();

  if (selectedConnectionId && !connections[selectedConnectionId]) {
    clearSelection();
  }
}

function syncRotationUI() {
  const toggle = document.getElementById('rotation-toggle');
  const icon = document.getElementById('rotation-icon');
  if (!toggle || !icon) return;

  toggle.classList.toggle('paused', !rotationEnabled);
  toggle.setAttribute('aria-pressed', String(!rotationEnabled));
  toggle.setAttribute('aria-label', rotationEnabled ? 'Pause rotation' : 'Resume rotation');
  toggle.title = rotationEnabled
    ? 'Pause rotation and move the map manually'
    : 'Resume automatic rotation';
  icon.textContent = rotationEnabled ? '⏸' : '▶';
}

function setRotationState(enabled) {
  rotationEnabled = enabled;
  if (globe?.controls()) {
    globe.controls().autoRotate = enabled;
  }
  syncRotationUI();
}

function toggleRotation() {
  setRotationState(!rotationEnabled);
}

function syncLayoutMetrics() {
  const header = document.getElementById('header');
  if (header) {
    document.documentElement.style.setProperty('--header-height', `${header.offsetHeight}px`);
  }
}

function isMobileLayout() {
  return window.innerWidth <= 840;
}

function syncSidePanelUI() {
  const open = isMobileLayout() && mobileSideOpen;
  document.body.classList.toggle('side-open', open);

  const toggle = document.getElementById('mobile-side-toggle');
  const icon = document.getElementById('mobile-side-icon');
  if (toggle) {
    toggle.setAttribute('aria-expanded', String(open));
  }
  if (icon) {
    icon.textContent = open ? 'X' : '+';
  }
}

function openSidePanel() {
  mobileSideOpen = true;
  syncSidePanelUI();
}

function closeSidePanel() {
  mobileSideOpen = false;
  syncSidePanelUI();
}

function toggleSidePanel() {
  mobileSideOpen = !mobileSideOpen;
  syncSidePanelUI();
}

// ── Stats helpers ────────────────────────────────────────────────
function recalcStats() {
  const active = Object.values(connections).filter(c => !c._pending && isConnectionListVisible(c));
  const countries = new Set(active.map(c => c.dst_country).filter(Boolean));
  const out = active.filter(c => c.direction === 'outgoing').length;
  const ins = active.filter(c => c.direction === 'incoming').length;

  setStatVal('s-total', active.length);
  setStatVal('s-out',   out);
  setStatVal('s-in',    ins);
  setStatVal('s-countries', countries.size);
  setStatVal('s-total-seen', totalSeen);

  document.getElementById('conn-count-badge').textContent = active.length;
}

function setStatVal(id, val) {
  const el = document.getElementById(id);
  if (!el) return;
  if (el.textContent !== String(val)) {
    el.textContent = val;
    el.classList.remove('bump');
    void el.offsetWidth;
    el.classList.add('bump');
  }
}

// ── Globe setup ──────────────────────────────────────────────────
function initGlobe() {
  const el = document.getElementById('globeViz');

  globe = Globe({ animateIn: true })
    .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
    .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
    .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
    .showAtmosphere(true)
    .atmosphereColor('rgba(0,130,255,0.18)')
    .atmosphereAltitude(0.18)
    // Arcs
    .arcsData([])
    .arcColor('color')
    .arcDashLength(d => d.arcKind === 'flow' ? 0.08 : 1)
    .arcDashGap(d => d.arcKind === 'flow' ? 0.9 : 0)
    .arcDashAnimateTime(d => d.arcKind === 'flow' ? 1800 : 0)
    .arcsTransitionDuration(0)
    .arcStroke(d => d.arcKind === 'flow' ? 0.72 : (d.direction === 'trace' ? 0.24 : 0.45))
    .arcAltitudeAutoScale(d => d.direction === 'trace' ? 0.08 : 0.4)
    .arcLabel(d =>
      `<div style="font-family:monospace;font-size:12px;background:rgba(2,12,28,.92);
       border:1px solid rgba(0,212,255,.3);padding:8px 12px;border-radius:6px;line-height:1.8">
        <b style="color:${d.direction==='outgoing'?'#00d4ff':'#ff3a3a'}">
          ${d.direction === 'outgoing' ? '↑ OUTGOING' : '↓ INCOMING'}
        </b><br>
        ${d.local_ip}:${d.local_port} → ${(d.display_ip || d.remote_ip)}:${d.remote_port}<br>
        <span style="color:#ffcc00">${d.port_name}</span><br>
        📍 ${d.dst_city}, ${d.dst_country}<br>
        ${d.remote_hostname ? `<span style="opacity:.85">${escapeHtml(d.remote_hostname)}</span><br>` : ''}
        <span style="opacity:.6">${d.dst_isp}</span>
      </div>`
    )
    // Points
    .pointsData([])
    .pointColor('color')
    .pointAltitude(d => d.altitude ?? 0)
    .pointRadius('radius')
    .pointLabel(d => d._label || '')
    .onPointClick(point => {
      if (Array.isArray(point?.connectionIds) && point.connectionIds.length) {
        selectConnectionGroup(point.connectionIds);
      } else if (point?.connectionId && connections[point.connectionId]) {
        selectConnectionGroup([point.connectionId]);
      }
    })
    .onGlobeClick(() => clearSelection())
    // Rings
    .ringsData([])
    .ringColor('color')
    .ringMaxRadius('maxR')
    .ringPropagationSpeed('speed')
    .ringRepeatPeriod('period')
    (el);

  globe.width(el.offsetWidth);
  globe.height(el.offsetHeight);

  const renderer = globe.renderer();
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));

  const maxAnisotropy = renderer.capabilities.getMaxAnisotropy();
  const globeMaterial = globe.globeMaterial();
  if (globeMaterial.map) {
    globeMaterial.map.anisotropy = maxAnisotropy;
    globeMaterial.map.needsUpdate = true;
  }
  if (globeMaterial.bumpMap) {
    globeMaterial.bumpMap.anisotropy = maxAnisotropy;
    globeMaterial.bumpMap.needsUpdate = true;
  }

  // Auto-rotate
  globe.controls().autoRotate      = rotationEnabled;
  globe.controls().autoRotateSpeed = 0.25;
  globe.controls().enableZoom      = true;
  syncRotationUI();

  // Resize
  window.addEventListener('resize', () => {
    globe.width(el.offsetWidth);
    globe.height(el.offsetHeight);
  });
}

// ── Globe update helpers ─────────────────────────────────────────
function addArc(conn) {
  const isOut = conn.direction === 'outgoing';
  arcsData.push({
    id: conn.id,
    startLat: conn.src_lat,
    startLng: conn.src_lon,
    endLat:   conn.dst_lat,
    endLng:   conn.dst_lon,
    color: isOut ? COLORS.out : COLORS.in,
    ...conn,
  });
  renderGlobeArcs();
}

function updateArc(conn) {
  const isOut = conn.direction === 'outgoing';
  let changed = false;
  arcsData = arcsData.map(arc => {
    if (arc.id !== conn.id) return arc;
    changed = true;
    return {
      ...arc,
      ...conn,
      startLat: conn.src_lat,
      startLng: conn.src_lon,
      endLat: conn.dst_lat,
      endLng: conn.dst_lon,
      color: isOut ? COLORS.out : COLORS.in,
    };
  });
  if (changed) renderGlobeArcs();
}

function removeArc(id) {
  arcsData = arcsData.filter(a => a.id !== id);
  renderGlobeArcs();
}

function addPoint(lat, lng, color, radius, label, extra = {}) {
  const point = { lat, lng, color, radius, _label: label, ...extra };
  if (point.connectionId) {
    pointsData = pointsData.filter(existing => existing.connectionId !== point.connectionId);
  }
  pointsData.push(point);
  renderGlobePoints();
}

function updatePoint(connectionId, lat, lng, color, radius, label, extra = {}) {
  let changed = false;
  let found = false;
  pointsData = pointsData.map(point => {
    if (point.connectionId !== connectionId) return point;
    found = true;
    changed = true;
    return { ...point, lat, lng, color, radius, _label: label, ...extra };
  });
  if (!found) {
    pointsData.push({ lat, lng, color, radius, _label: label, connectionId, ...extra });
    changed = true;
  }
  if (connectionId) {
    let seen = false;
    pointsData = pointsData.filter(point => {
      if (point.connectionId !== connectionId) return true;
      if (seen) return false;
      seen = true;
      return true;
    });
  }
  if (changed) renderGlobePoints();
}

function addRing(lat, lng, color, maxR = 2.5, speed = 2.5, period = 900) {
  ringsData.push({ lat, lng, color, maxR, speed, period });
  globe.ringsData(ringsData);
  // Auto-remove after a few seconds
  setTimeout(() => {
    ringsData.shift();
    globe.ringsData(ringsData);
  }, period * 4);
}

// ── Connection list ──────────────────────────────────────────────
const safeId = id => 'ci-' + id.replace(/[^a-zA-Z0-9]/g, '_');

function addToList(conn) {
  const list = document.getElementById('conn-list');
  const empty = document.getElementById('empty-state');
  if (empty) empty.remove();

  const isOut = conn.direction === 'outgoing';
  const sid = safeId(conn.id);

  const item = document.createElement('div');
  item.className = 'conn-item';
  item.id = sid;

  item.addEventListener('click', () => focusConnection(connections[conn.id] || conn));
  renderListItem(item, conn);
  item.classList.toggle('filtered-out', !isConnectionListVisible(conn));
  list.insertBefore(item, list.firstChild);

  // Limit list to 150 entries
  while (list.children.length > 150) {
    list.removeChild(list.lastChild);
  }
}

}

function syncTraceButton() {

  if (!btn) return;
  const isLoading = traceLoadingConnectionId && traceLoadingConnectionId === selectedConnectionId;
  btn.disabled = Boolean(isLoading);
  btn.textContent = isLoading ? 'TRACING...' : 'TRACE ROUTE';
}

function clearTraceTimers() {
  traceTimers.forEach(timer => clearTimeout(timer));
  traceTimers = [];
}

function clearTraceroute() {
  clearTraceTimers();
  traceArcsData = [];
  tracePointsData = [];
  renderGlobeArcs();
  renderGlobePoints();

function renderTraceHistory() {
  const list = document.getElementById('trace-history');
  const badge = document.getElementById('trace-count-badge');
  if (badge) badge.textContent = traceHistory.length;
  if (!list) return;

  if (!traceHistory.length) {

    </button>

}

function addTraceHistory(data) {
  if (!data?.target_ip) return;
  traceHistory = traceHistory.filter(trace => trace.target_ip !== data.target_ip);
  traceHistory.unshift(data);
  traceHistory = traceHistory.slice(0, 30);
  renderTraceHistory();
}

function showTraceFromHistory(targetIp) {
  const trace = traceHistory.find(item => item.target_ip === targetIp);
  if (!trace) return;
  animateTraceroute(trace);
  setTraceStatus(`Showing saved trace to ${targetIp}.`);
}

function formatHopLocation(hop) {
  if (hop.status === 'timeout') return 'Timeout';
  const parts = [hop.city, hop.country].filter(Boolean);
  if (parts.length) return parts.join(', ');
  return hop.is_private ? 'Private network' : 'Location unavailable';
}

function formatHopRange(hops) {
  return hops.map(hop => `#${hop.hop}`).join(', ');
}

function getTraceLocationKey(hop) {
  const countryCode = String(hop.countryCode || '').toLowerCase();
  const countryName = String(hop.country || '').toLowerCase();
  const cityName = String(hop.city || '').toLowerCase();
  const countryKey = countryCode || countryName || 'unknown-country';
  const cityKey = cityName || 'unknown-city';
  return `${countryKey}|${cityKey}`;
}

function groupTraceHopsByCityCountry(hops) {
  const groups = [];
  const byLocation = new Map();
  getVisibleTraceHops(hops).forEach(hop => {
    const key = getTraceLocationKey(hop);
    let group = byLocation.get(key);
    if (!group) {
      group = {
        ...hop,
        hops: [],
        ips: [],
        hostnames: [],
        isps: [],
        firstHop: hop.hop,
        lastHop: hop.hop,
      };
      byLocation.set(key, group);
      groups.push(group);
    }
    group.hops.push(hop);
    group.firstHop = Math.min(group.firstHop, hop.hop);
    group.lastHop = Math.max(group.lastHop, hop.hop);
    if (hop.ip && !group.ips.includes(hop.ip)) group.ips.push(hop.ip);
    if (hop.hostname && !group.hostnames.includes(hop.hostname)) group.hostnames.push(hop.hostname);
    if (hop.isp && !group.isps.includes(hop.isp)) group.isps.push(hop.isp);

    if (!Number.isFinite(Number(group.lat)) && Number.isFinite(Number(hop.lat))) group.lat = hop.lat;
    if (!Number.isFinite(Number(group.lon)) && Number.isFinite(Number(hop.lon))) group.lon = hop.lon;
  });
  return groups.sort((a, b) => a.firstHop - b.firstHop);
}

function renderTraceHopList(hops) {
  const list = document.getElementById('trace-hop-list');
  if (!list) return;
  const visibleGroups = groupTraceHopsByCityCountry(hops);
  list.innerHTML = visibleGroups.map(group => `
    <div class="trace-hop">
      <div class="trace-hop-no">${escapeHtml(formatHopRange(group.hops))}</div>
      <div>
        <div class="trace-hop-main">${escapeHtml(formatHopLocation(group))}</div>
        <div class="trace-hop-meta">${escapeHtml(group.ips.join(', '))}</div>
        ${group.hostnames.length ? `<div class="trace-hop-meta">${escapeHtml(group.hostnames.join(', '))}</div>` : ''}
        ${group.isps.length ? `<div class="trace-hop-meta">${escapeHtml(group.isps.join(', '))}</div>` : ''}
      </div>
    </div>
  `).join('');
}

function getVisibleTraceHops(hops) {
  return (hops || []).filter(hop => hop && hop.status !== 'timeout' && hop.ip);
}

function buildTracePointLabel(hop) {
  return `<div style="font-family:monospace;font-size:12px;
    background:rgba(2,12,28,.94);border:1px solid rgba(255,0,255,.42);
    padding:8px 12px;border-radius:6px;line-height:1.6">
    <b style="color:#ff4dff">HOPS ${escapeHtml(formatHopRange(hop.hops || [hop]))}</b><br>
    ${escapeHtml(formatHopLocation(hop))}<br>
    ${hop.ips?.length ? `<span style="opacity:.7">${escapeHtml(hop.ips.join(', '))}</span><br>` : ''}
    ${hop.hostnames?.length ? `<span style="opacity:.75">${escapeHtml(hop.hostnames.join(', '))}</span><br>` : ''}
    ${hop.estimated ? '<span style="opacity:.75;color:#ff4dff">estimated map position</span><br>' : ''}
    ${hop.localOffset ? '<span style="opacity:.75;color:#ff4dff">offset from this device marker</span><br>' : ''}
    <span style="opacity:.6">${escapeHtml((hop.isps || [hop.isp]).filter(Boolean).join(', '))}</span>
  </div>`;
}

function normalizeLngDelta(delta) {
  if (delta > 180) return delta - 360;
  if (delta < -180) return delta + 360;
  return delta;
}

function offsetTraceHopPosition(point, index, totalInCluster) {
  if (totalInCluster <= 1) return point;

  const ringRadius = Math.min(0.85, 0.24 + totalInCluster * 0.055);
  const angle = (index / totalInCluster) * Math.PI * 2;
  const latOffset = Math.sin(angle) * ringRadius;
  const lonScale = Math.max(0.35, Math.cos(Number(point.lat) * Math.PI / 180));
  const lonOffset = Math.cos(angle) * ringRadius / lonScale;

  return {
    ...point,
    lat: Math.max(-89, Math.min(89, Number(point.lat) + latOffset)),
    lon: ((Number(point.lon) + lonOffset + 540) % 360) - 180,
    estimated: point.estimated || point.clusterOffset,
  };
}

function spreadOverlappingTraceHops(hops) {
  const clusters = new Map();
  hops.forEach((hop, index) => {
    const key = `${Number(hop.lat).toFixed(3)}|${Number(hop.lon).toFixed(3)}`;
    if (!clusters.has(key)) clusters.set(key, []);
    clusters.get(key).push(index);
  });

  const next = [...hops];
  clusters.forEach(indexes => {
    if (indexes.length <= 1) return;
    indexes.forEach((hopIndex, clusterIndex) => {
      next[hopIndex] = offsetTraceHopPosition(
        { ...next[hopIndex], clusterOffset: true },
        clusterIndex,
        indexes.length
      );
    });
  });

  return next;
}

function keepTraceHopsClearOfLocalPoint(hops) {
  if (!Number.isFinite(Number(myLat)) || !Number.isFinite(Number(myLon))) return hops;

  return hops.map((hop, index) => {
    const lat = Number(hop.lat);
    const lon = Number(hop.lon);
    if (!Number.isFinite(lat) || !Number.isFinite(lon)) return hop;

    const dLat = lat - Number(myLat);
    const dLon = normalizeLngDelta(lon - Number(myLon));
    const distance = Math.sqrt(dLat * dLat + dLon * dLon);
    if (distance >= 0.9) return hop;

    const angle = distance > 0.01
      ? Math.atan2(dLat, dLon)
      : ((index * 137.5) * Math.PI / 180);
    const targetDistance = 0.9 + (index % 3) * 0.16;
    const nextLat = Math.max(-89, Math.min(89, Number(myLat) + Math.sin(angle) * targetDistance));
    const lonScale = Math.max(0.35, Math.cos(Number(myLat) * Math.PI / 180));
    const nextLon = ((Number(myLon) + (Math.cos(angle) * targetDistance) / lonScale + 540) % 360) - 180;

    return {
      ...hop,
      lat: nextLat,
      lon: nextLon,
      estimated: true,
      localOffset: true,
    };
  });
}

function getTraceDisplayHops(hops) {
  const raw = [];

  groupTraceHopsByCityCountry(hops).forEach(hop => {
    const lat = Number(hop.lat);
    const lon = Number(hop.lon);
    raw.push({
      ...hop,
      lat: Number.isFinite(lat) ? lat : null,
      lon: Number.isFinite(lon) ? lon : null,
      estimated: !(Number.isFinite(lat) && Number.isFinite(lon)),
    });
  });

  const knownIndexes = raw
    .map((hop, index) => Number.isFinite(Number(hop.lat)) && Number.isFinite(Number(hop.lon)) ? index : -1)
    .filter(index => index >= 0);

  if (!knownIndexes.length) return [];

  const firstKnown = knownIndexes[0];
  for (let index = 0; index < firstKnown; index++) {
    raw[index].lat = raw[firstKnown].lat;
    raw[index].lon = raw[firstKnown].lon;
    raw[index].estimated = true;
  }

  for (let k = 0; k < knownIndexes.length - 1; k++) {
    const startIndex = knownIndexes[k];
    const endIndex = knownIndexes[k + 1];
    const start = raw[startIndex];
    const end = raw[endIndex];
    const span = endIndex - startIndex;
    for (let index = startIndex + 1; index < endIndex; index++) {
      const t = (index - startIndex) / span;
      raw[index].lat = Number(start.lat) + (Number(end.lat) - Number(start.lat)) * t;
      raw[index].lon = Number(start.lon) + normalizeLngDelta(Number(end.lon) - Number(start.lon)) * t;
      raw[index].lon = ((raw[index].lon + 540) % 360) - 180;
      raw[index].estimated = true;
    }
  }

  const lastKnown = knownIndexes[knownIndexes.length - 1];
  for (let index = lastKnown + 1; index < raw.length; index++) {
    raw[index].lat = raw[lastKnown].lat;
    raw[index].lon = raw[lastKnown].lon;
    raw[index].estimated = true;
  }

  return keepTraceHopsClearOfLocalPoint(spreadOverlappingTraceHops(raw));
}

function animateTraceroute(data) {
  clearTraceroute();
  const geoHops = getTraceDisplayHops(data.hops);
  renderTraceHopList(data.hops);

  if (geoHops.length < 2) {
    setTraceStatus('Trace completed, but there are not enough hops for a map path.', true);
    return;
  }

  const estimatedCount = geoHops.filter(hop => hop.estimated).length;
  setTraceStatus(`Animating ${geoHops.length - 1} trace segments${estimatedCount ? `, ${estimatedCount} estimated positions` : ''}.`);
  focusMapOnTarget(geoHops[0].lat, geoHops[0].lon, 1.35, 900);

  geoHops.forEach((hop, index) => {
    traceTimers.push(setTimeout(() => {
      tracePointsData.push({
        lat: hop.lat,
        lng: hop.lon,
        color: COLORS.tracePoint,
        radius: 0.12,
        altitude: 0,
        _label: buildTracePointLabel(hop),
      });
      renderGlobePoints();
      addRing(hop.lat, hop.lon, COLORS.tracePoint, 0.9, 2.1, 1200);
    }, index * 520));

    const prev = index === 0
      ? { lat: Number(myLat), lon: Number(myLon) }
      : geoHops[index - 1];
    if (!Number.isFinite(prev.lat) || !Number.isFinite(prev.lon)) return;
    traceTimers.push(setTimeout(() => {
      traceArcsData.push({
        id: `trace-${Date.now()}-${index}`,
        startLat: prev.lat,
        startLng: prev.lon,
        endLat: hop.lat,
        endLng: hop.lon,
        color: COLORS.trace,
        direction: 'trace',
      });
      renderGlobeArcs();
      focusMapOnTarget(hop.lat, hop.lon, index === geoHops.length - 1 ? 0.9 : 1.15, 850);
    }, index * 520 + 180));
  });
}

async function runTracerouteForSelected() {
  const conn = selectedConnectionId ? connections[selectedConnectionId] : null;
  if (!conn) return;

  traceLoadingConnectionId = conn.id;
  syncTraceButton();
  clearTraceroute();
  setTraceStatus(`Running native traceroute to ${conn.remote_ip}...`);

  try {
    const response = await fetch('/api/traceroute', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ connection_id: conn.id, ip: conn.remote_ip }),
    });
    const data = await response.json();
    if (!data.ok) {
      setTraceStatus(data.error || 'Traceroute failed.', true);
      return;
    }
    addTraceHistory(data);
    animateTraceroute(data);
  } catch (error) {
    setTraceStatus(`Traceroute failed: ${error.message}`, true);
  } finally {
    traceLoadingConnectionId = null;
    syncTraceButton();
  }
}

function selectConnection(conn) {
  setSelectedConnection(conn);
  renderConnectionDetail(conn);
  rebuildConnectionPoints();
}

function selectConnectionGroup(ids) {
  const group = ids.map(id => connections[id]).filter(Boolean);
  if (!group.length) return;
  setSelectedConnectionGroup(group.map(conn => conn.id));
  renderConnectionDetail(group[0]);
  rebuildConnectionPoints();
  scrollGroupIntoView(group.map(conn => conn.id));
  if (isMobileLayout()) openSidePanel();
}

function hasValidGeoTarget(conn) {
  return Number.isFinite(Number(conn?.dst_lat)) && Number.isFinite(Number(conn?.dst_lon));
}

function focusMapOnTarget(lat, lng, altitude = 0.65, duration = 1500) {
  if (!globe) return;
  globe.controls().autoRotate = false;
  globe.pointOfView(
    { lat: Number(lat), lng: Number(lng), altitude },
    duration
  );
}

function focusConnection(conn) {
  selectConnection(conn);
  if (!hasValidGeoTarget(conn)) return;

  const focusDelay = isMobileLayout() ? 180 : 0;
  if (isMobileLayout()) {
    closeSidePanel();
    setTimeout(() => {
      const globeEl = document.getElementById('globeViz');
      if (globeEl) {
        globe.width(globeEl.offsetWidth);
        globe.height(globeEl.offsetHeight);
      }
    }, focusDelay / 2);
  }

  setTimeout(() => {
    focusMapOnTarget(conn.dst_lat, conn.dst_lon);
    addRing(
      conn.dst_lat,
      conn.dst_lon,
      COLORS.tracePoint,
      4.2,
      3.4,
      1200
    );
  }, focusDelay);

  setTimeout(() => {
    if (rotationEnabled && globe?.controls()) {
      globe.controls().autoRotate = true;
    }
  }, 5000 + focusDelay);
}

// ── Socket.IO ────────────────────────────────────────────────────
const socket = io({ transports: ['websocket', 'polling'] });

socket.on('connect', () => {
  console.log('[WS] Connected');
});

socket.on('my_location', (data) => {
  if (!data || !data.lat) return;
  myLat = data.lat;
  myLon = data.lon;

  document.getElementById('my-ip').textContent =
    `${data.ip || ''}  |  ${data.city}, ${data.country}`;

  // Local location as a green point
  addPoint(myLat, myLon, COLORS.local, 0.28,
    getLocalDevicePointLabel(),
    { isLocal: true, altitude: 0 }
  );

  // Rotate globe toward the local location
  setTimeout(() => {
    globe.pointOfView({ lat: myLat, lng: myLon, altitude: 2.2 }, 2000);
  }, 1500);

  // Hide loading screen
  document.getElementById('loading').classList.add('hidden');
});

socket.on('adapters', (adapters) => {
  const sel = document.getElementById('adapter-select');
  const cur = sel.value;
  sel.innerHTML = '';
  adapters.forEach(a => {
    const opt = document.createElement('option');
    opt.value = a.name;
    opt.textContent = a.display;
    if (a.name === cur) opt.selected = true;
    sel.appendChild(opt);
  });
  localDeviceIp = pickLocalDeviceIp(adapters, cur || 'all');
  updateLocalDevicePoint();
});

socket.on('new_connection', (conn) => {
  if (connections[conn.id]) return;
  connections[conn.id] = conn;
  totalSeen++;

  addArc(conn);
  rebuildConnectionPoints();
  addRing(conn.dst_lat, conn.dst_lon,
    conn.direction === 'outgoing' ? '#00d4ff' : '#ff3a3a');

  addToList(conn);
  recalcStats();
});

socket.on('update_connection', (conn) => {
  if (!connections[conn.id]) return;
  const previous = connections[conn.id];
  const geometryChanged = connectionGeometryChanged(previous, conn);
  connections[conn.id] = conn;

  if (geometryChanged) {
    updateArc(conn);
    rebuildConnectionPoints();
  }
  updateListItem(conn);

  if (selectedConnectionId === conn.id) {
    if (selectedConnectionGroupIds.length > 1) {
      setSelectedConnectionGroup(selectedConnectionGroupIds);
    } else {
      renderConnectionDetail(conn);
      setSelectedConnection(conn);
    }
  }
  recalcStats();
});

socket.on('connection_closed', (data) => {
  if (!connections[data.id]) return;
  delete connections[data.id];
  selectedConnectionGroupIds = selectedConnectionGroupIds.filter(id => id !== data.id);
  if (selectedConnectionId === data.id || !selectedConnectionGroupIds.length) {
    clearSelection();
  }
  removeArc(data.id);
  removeFromList(data.id);
  rebuildConnectionPoints();
  recalcStats();
});

// ── Adapter wechseln ─────────────────────────────────────────────
function setAdapter(adapter) {
  socket.emit('set_adapter', { adapter });
  // Clear connection list and arcs
  arcsData   = [];
  pointsData = pointsData.filter(p => p.color === COLORS.local); // Keep local point
  clearTraceroute();
  if (globe) {
    renderGlobeArcs();
    renderGlobePoints();
  }
  Object.keys(connections).forEach(k => {
    delete connections[k];
    removeFromList(k);
  });
  clearSelection();
  recalcStats();
}

// ── Init ─────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  initGlobe();
  syncLayoutMetrics();
  syncSidePanelUI();
  syncFilterUI();
  renderTraceHistory();

  const filterWrap = document.getElementById('filter-wrap');
  if (filterWrap) {
    filterWrap.addEventListener('click', event => event.stopPropagation());
  }
  document.addEventListener('click', closeFilterMenu);

  window.addEventListener('resize', () => {
    syncLayoutMetrics();
    if (!isMobileLayout()) {
      mobileSideOpen = false;
    }
    syncSidePanelUI();
  });

  window.addEventListener('keydown', (event) => {
    if (event.key === 'Escape') {
      closeFilterMenu();
      if (isMobileLayout()) {
        closeSidePanel();
      }
    }
  });

  // Fallback: Loading nach 8s verstecken
  setTimeout(() => {
    document.getElementById('loading').classList.add('hidden');
  }, 8000);
});
</script>
</body>
</html>
